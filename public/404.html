<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // SPA redirect for GitHub Pages
    // Store the intended path and redirect to root
    var path = window.location.pathname.replace('/krasnoyarsk-sweet-dreams', '');
    if (path && path !== '/' && path !== '/index.html') {
      sessionStorage.setItem('gh-pages-redirect', path + window.location.search + window.location.hash);
    }
    window.location.href = '/krasnoyarsk-sweet-dreams/';
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build
        env:
          GITHUB_PAGES: "true"
          NODE_ENV: production

      - name: Find build output
        run: |
          echo "=== Searching for index.html ==="
          find . -name "index.html" -not -path "*/node_modules/*" | head -20
          echo "=== Listing common output dirs ==="
          ls -la .output/public/ 2>/dev/null || echo "No .output/public"
          ls -la dist/ 2>/dev/null || echo "No dist/"
          ls -la .vinxi/ 2>/dev/null || echo "No .vinxi/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
